apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      serviceAccountName: mlflow
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:v2.14.1
          command:
            - /bin/sh
            - -c
            - |
              set -e
              python -m pip install --no-cache-dir psycopg2-binary
              export DB_USERNAME="$(cat /mnt/secrets/DB_USERNAME)"
              export DB_PASSWORD="$(cat /mnt/secrets/DB_PASSWORD)"
              export DB_HOST="$(cat /mnt/secrets/DB_HOST)"
              export DB_PORT="$(cat /mnt/secrets/DB_PORT)"
              export DB_NAME="$(cat /mnt/secrets/DB_NAME)"
              export MLFLOW_TRACKING_URI="http://0.0.0.0:5000"
              export MLFLOW_BACKEND_STORE_URI="postgresql://${DB_USERNAME}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}"
              export MLFLOW_DEFAULT_ARTIFACT_ROOT="s3://mlflow-artifacts"
              mlflow server --host 0.0.0.0 --port 5000
          ports:
            - containerPort: 5000
          volumeMounts:
            - name: db-secrets
              mountPath: /mnt/secrets
              readOnly: true
      volumes:
        - name: db-secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: mlflow-db-secret
